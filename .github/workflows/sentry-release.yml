name: Sentry Release
on:
  workflow_run:
    workflows:
      - CI (CPU)
    types:
      - completed

concurrency:
  group: sentry-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sentry-release:
    name: Create Sentry Release
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install pinned sentry-cli
        env:
          SENTRY_CLI_VERSION: "3.4.0"
        run: |
          set -euo pipefail
          asset_name="sentry-cli-Linux-x86_64"
          asset_url="https://downloads.sentry-cdn.com/sentry-cli/${SENTRY_CLI_VERSION}/${asset_name}"
          expected_sha256="$(curl -fsSL "https://release-registry.services.sentry.io/apps/sentry-cli/${SENTRY_CLI_VERSION}" | python -c 'import json,sys; print(json.load(sys.stdin)["files"]["sentry-cli-Linux-x86_64"]["checksums"]["sha256-hex"])')"
          curl -fsSL "$asset_url" -o sentry-cli
          echo "${expected_sha256}  sentry-cli" | sha256sum -c -
          chmod +x sentry-cli
          sudo mv sentry-cli /usr/local/bin/sentry-cli
          sentry-cli --version

      - name: Create Sentry Release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: limen-neural
          SENTRY_PROJECT: rust
        run: |
          VERSION="corinth-canal@$(git rev-parse --short HEAD)"
          sentry-cli releases new "$VERSION"
          sentry-cli releases set-commits --auto "$VERSION"
          sentry-cli releases finalize "$VERSION"
