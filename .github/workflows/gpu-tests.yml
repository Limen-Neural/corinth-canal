name: GPU CUDA Build Validation (13.2 + sm_120)
on:
  pull_request:
    branches:
      - '**'

concurrency:
  group: gpu-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gpu-tests:
    runs-on: [self-hosted, Linux, X64, cuda-13.2, sm_120, gpu]
    name: GPU CUDA Build Validation
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Check CUDA Version >= 13.2
        run: |
          CUDA_VERSION=$(nvcc --version | grep -oP 'release \K[0-9.]+' | head -1)
          REQUIRED="13.2"
          if [ "$(printf '%s\n' "$REQUIRED" "$CUDA_VERSION" | sort -V | head -n1)" != "$REQUIRED" ]; then
            echo "❌ CUDA $CUDA_VERSION < 13.2 required"
            exit 1
          fi
          echo "✅ CUDA $CUDA_VERSION verified"
      
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Compile CUDA targets in pinned Ubuntu 22.04 toolchain
        run: |
          docker run --rm \
            -v "$PWD:/app" \
            -w /app \
            nvidia/cuda:13.2.0-devel-ubuntu22.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update >/dev/null
              apt-get install -y curl build-essential pkg-config cmake clang llvm libssl-dev >/dev/null
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable >/dev/null
              export PATH=/root/.cargo/bin:$PATH
              export CUDAHOSTCXX=/usr/bin/clang++
              cargo test --lib --features cuda --no-run --locked
              cargo check --examples --features cuda --locked
            '
      
      - name: PR Comment on Success/Failure
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const title = status === 'success' ? 'GPU CUDA Build Validation Passed' : 'GPU CUDA Build Validation Failed';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} **${title}**\n\nRunner: ShipOfTheseus (RTX 5080)\nValidation: CUDA lib-test compile + example compile in Ubuntu 22.04 / CUDA 13.2 toolchain\nCUDA: 13.2+ (sm_120)\n[View logs](${context.payload.repository.html_url}/actions/runs/${context.runId})`
            });
