family = "qwen3_moe"
path = "/home/raulmc/.models/safetensors/arcee-ai/Trinity-Nano-Base"
target = "local"

# ── microsoft/Phi-tiny-MoE-instruct (MoE, 2 shards) ──
[[model]]
slug = "phi_tiny_moe_instruct"
family = "qwen3_moe"
path = "/home/raulmc/.models/safetensors/microsoft/Phi-tiny-MoE-instruct"
target = "local"

# ── slowfastai/Moonlight-16B-A3B-bnb-4bit (MoE, 2 shards, bnb 4bit quant) ──
