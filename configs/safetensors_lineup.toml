# corinth-canal Safetensors manifest lineup.
#
# Loaded by examples/safetensors_manifest.rs when SAFETENSORS_LINEUP_CONFIG
# points at this file. Each [[model]] entry defines a safetensors checkpoint
# to inspect — corinth-canal reads only headers and metadata, not tensor
# payload bytes.
#
# Safetensors inspection is a setup-and-preparation step. The router path
# (`OlmoeRouter`) remains GGUF-backed. Use safetensors manifests when the
# goal is checkpoint anatomy: tensor names, dtypes, shapes, byte sizes,
# source shards, and recognizable MoE router/expert candidates.
#
# Fields:
#   slug          directory-safe identifier (used in artifact paths)
#   family        model family for tensor classification heuristics
#                 one of: olmoe | qwen3_moe | gemma4 | deepseek2 | llama_moe | zaya | glm4
#   path          absolute path to a .safetensors file, .safetensors.index.json,
#                 or directory containing safetensors shards
#   target        execution target: "local"
#
# ── Local safetensors onboarding ──────────────────────────────────────────

# ── MET-55: nvidia/NVIDIA-Nemotron-3-Nano-4B-BF16 (Dense, single shard) ──
[[model]]
slug = "nemotron_3_nano_4b"
family = "llama_moe"
path = "/home/raulmc/.models/safetensors/nvidia/NVIDIA-Nemotron-3-Nano-4B-BF16/model.safetensors"
target = "local"

# ── MET-56: ibm-granite/granite-3.1-3b-a800m-base (MoE, 2 shards) ──
[[model]]
slug = "granite_3_1_3b_a800m"
family = "qwen3_moe"
path = "/home/raulmc/.models/safetensors/ibm-granite/granite-3.1-3b-a800m-base"
target = "local"

# ── MET-58: arcee-ai/Trinity-Nano-Base (MoE, 7 shards) ──
[[model]]
