# corinth-canal SAAQ 1.5 cloud model lineup.
#
# Loaded by examples/saaq_latent_calibration.rs when
# CLOUD_LINEUP_CONFIG points at this file (or when cloud sweep mode is
# enabled). Each [[model]] entry is a cloud metadata stub — corinth-canal
# does not create, provision, or tear down cloud resources.
#
# Cloud execution is delegated to Dioscuri-Cloud. This file records
# metadata that corinth-canal stamps into experiment manifests and uses
# for fail-fast validation at startup. When a model's required env vars
# are unset, the runner emits a diagnostic and skips the candidate rather
# than attempting partial execution.
#
# Fields:
#   slug                directory-safe identifier (used in artifact paths)
#   family              model family for routing tensor selection
#                       one of: olmoe | qwen3_moe | gemma4 | deepseek2 | llama_moe | zaya | glm4
#   cloud_model_id      provider-qualified model identifier (passed to Dioscuri-Cloud)
#   source_url          canonical model card or provider listing
#   target              execution target: "cloud"
#   architecture        model class: "moe" | "dense"
#   active_params       known active parameter count (informational)
#   total_params        total parameter count including shared weights (informational)
#   provider_format     expected runtime format on the cloud side
#   required_env_vars   env var names required for cloud execution (no secrets)
#
# ── SAAQ campaign tags (per-model overrides in artifact manifests) ──
# Defaults applied by the runner unless overridden per-entry:
#   SAAQ_RULE        = "saaq_v1_5"
#   TELEMETRY_SOURCE = "synthetic" | "csv"
#   HEARTBEAT        = "off" | "on"
#   REPEAT_COUNT     = 2
#
# No Terraform, no cloud credentials, no provider SDK code.

# ── MET-55: nvidia/NVIDIA-Nemotron-3-Nano-4B-BF16 (Dense, existing safetensors) ──
[[model]]
slug = "nemotron_3_nano_4b_cloud"
family = "llama_moe"
cloud_model_id = "nvidia/nvidia-nemotron-3-nano-4B-BF16"
source_url = "https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Nano-4B-BF16"
target = "cloud"
architecture = "dense"
active_params = "4B"
total_params = "4B"
provider_format = "nvcf-nim"
required_env_vars = ["NEMOTRON_NIM_ENDPOINT", "NEMOTRON_NIM_API_KEY"]

