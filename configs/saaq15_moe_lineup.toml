# Shareable SAAQ 1.5 MoE lineup template.
#
# Loaded by examples/saaq_latent_calibration.rs when LINEUP_CONFIG points at
# this file. Each [[model]] entry defines one validation target.
#
# Replace each placeholder `path` with the real absolute GGUF checkpoint path
# on your machine. Do not commit machine-specific replacements; keep local
# overrides in an untracked copy or in `.env.local` via LINEUP_CONFIG.
#
# Fields:
#   slug          directory-safe identifier (used in artifact paths)
#   family        one of: olmoe | qwen3_moe | gemma4 | deepseek2 | llama_moe | zaya | glm4
#   path          absolute path to a GGUF checkpoint
#   routing_mode  optional: "spiking_sim" | "dense_sim" | "stub_uniform"
#                 unset => ModelConfig::routing_mode default (SpikingSim)

[[model]]
